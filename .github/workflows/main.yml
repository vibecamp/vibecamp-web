name: Typecheck, lint, and build front-end
on: [push]
jobs:
  front-end-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: npm install
        working-directory: front-end
        run: npm install
      - name: Lint
        working-directory: front-end
        run: npx eslint .
  front-end-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: npm install
        working-directory: front-end
        run: npm install
      - name: Typecheck
        working-directory: front-end
        run: npx tsc --noEmit
  back-end-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: denoland/setup-deno@v1
        with:
          deno-version: "1.36.3"
      - name: Typecheck
        working-directory: back-end
        run: deno task check
  integration-tests:
    runs-on: ubuntu-latest
    needs: [front-end-lint, front-end-typecheck, back-end-check]
    steps:
      - uses: actions/checkout@v2
      - uses: denoland/setup-deno@v1
        with:
          deno-version: "1.36.3"
      - name: npm ci
        working-directory: front-end
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: front-end
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: front-end
        run: npx playwright test
        env:
          CI: "true"
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: front-end/playwright-report/
          retention-days: 30
  deploy:
    runs-on: ubuntu-latest
    needs: [front-end-lint, front-end-typecheck, back-end-check, integration-tests]
    env:
      RENDER_DEPLOY_URL_BACKEND: ${{ secrets.RENDER_DEPLOY_URL_BACKEND }}
      RENDER_DEPLOY_URL_FRONTEND: ${{ secrets.RENDER_DEPLOY_URL_FRONTEND }}
    steps:
      - name: Deploy
        run: curl "$RENDER_DEPLOY_URL_BACKEND" && curl "$RENDER_DEPLOY_URL_FRONTEND"
